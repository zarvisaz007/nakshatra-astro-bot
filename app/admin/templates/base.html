<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nakshatra Admin — {% block title %}{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#e0d9f7;min-height:100vh}
a{color:#a78bfa;text-decoration:none}
a:hover{text-decoration:underline;color:#c4b5fd}

/* Nav */
nav{background:#12122a;border-bottom:1px solid #2a2a4a;padding:0 24px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100}
nav .logo{font-size:16px;font-weight:700;color:#c4b5fd;padding:14px 20px 14px 0;margin-right:8px;border-right:1px solid #2a2a4a;white-space:nowrap}
nav .nav-link{color:#9ca3af;font-size:13px;padding:14px 14px;border-bottom:2px solid transparent;transition:all .15s}
nav .nav-link:hover{color:#e0d9f7;text-decoration:none}
nav .nav-link.active{color:#c4b5fd;border-bottom:2px solid #7c3aed}
nav .spacer{flex:1}
nav .nav-badge{background:#7c3aed22;color:#a78bfa;font-size:11px;padding:2px 7px;border-radius:10px;margin-left:4px}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:28px 24px}
h1{font-size:22px;font-weight:700;margin-bottom:24px;color:#f0ebff}
h2{font-size:15px;font-weight:600;margin-bottom:14px;color:#c4b5fd}
h3{font-size:13px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}

/* Cards */
.card{background:#12122a;border:1px solid #2a2a4a;border-radius:12px;padding:20px;margin-bottom:18px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:20px}
.stat{background:#12122a;border:1px solid #2a2a4a;border-radius:10px;padding:18px 16px;text-align:center;transition:border-color .15s}
.stat:hover{border-color:#4c3aad}
.stat .num{font-size:28px;font-weight:700;color:#a78bfa;line-height:1}
.stat .num.green{color:#4ade80}
.stat .num.amber{color:#fbbf24}
.stat .num.red{color:#f87171}
.stat .num.blue{color:#60a5fa}
.stat .label{font-size:11px;color:#6b7280;margin-top:5px;text-transform:uppercase;letter-spacing:.04em}
.stat .sub{font-size:11px;color:#4b5563;margin-top:2px}

/* Two-col grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
@media(max-width:800px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;color:#6b7280;border-bottom:1px solid #1e1e38;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 12px;border-bottom:1px solid #16162e;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#16162e}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-free{background:#1e293b;color:#64748b}
.badge-basic{background:#1c2a1c;color:#4ade80}
.badge-premium{background:#1a1a3a;color:#818cf8}
.badge-elite{background:#2a1a1a;color:#fb923c}
.badge-en{background:#1e293b;color:#7dd3fc}
.badge-hi{background:#2d1b1b;color:#f97316}
.badge-ok{background:#14532d30;color:#4ade80}
.badge-err{background:#7f1d1d30;color:#f87171}
.badge-on{background:#14532d30;color:#4ade80}
.badge-off{background:#1e293b;color:#64748b}

/* Forms */
form label{display:block;font-size:12px;color:#9ca3af;margin-bottom:5px;font-weight:500}
input[type=text],input[type=password],input[type=number],select,textarea{
  width:100%;background:#0a0a1a;border:1px solid #2a2a4a;border-radius:8px;
  padding:9px 12px;color:#e0d9f7;font-size:13px;margin-bottom:14px;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#7c3aed}
.btn{background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:9px 18px;
  font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap;display:inline-block}
.btn:hover{background:#6d28d9;text-decoration:none;color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-outline{background:transparent;border:1px solid #4c3aad;color:#a78bfa}
.btn-outline:hover{background:#1e1a3a}
.btn-danger{background:#7f1d1d;color:#fca5a5}
.btn-danger:hover{background:#991b1b}
.btn-green{background:#14532d;color:#4ade80}
.btn-green:hover{background:#166534}

/* Alerts */
.alert{padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px}
.alert-success{background:#14532d20;border:1px solid #22c55e30;color:#86efac}
.alert-warn{background:#78350f20;border:1px solid #f59e0b30;color:#fcd34d}
.alert-err{background:#7f1d1d20;border:1px solid #ef444430;color:#fca5a5}

/* Search bar */
.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{margin-bottom:0;flex:1;min-width:140px}
.filters .btn{margin-bottom:0}

/* Bar charts */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;padding-top:8px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px}
.bar-col .bar{width:100%;background:#7c3aed44;border-radius:4px 4px 0 0;min-height:2px;transition:background .15s;position:relative}
.bar-col .bar:hover{background:#7c3aed88}
.bar-col .bar-label{font-size:10px;color:#6b7280;text-align:center;white-space:nowrap;overflow:hidden}
.bar-col .bar-val{font-size:10px;color:#9ca3af;text-align:center}

/* Horizontal bars */
.hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.hbar-label{font-size:12px;color:#9ca3af;width:120px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbar-track{flex:1;background:#1e1e38;border-radius:4px;height:18px;overflow:hidden}
.hbar-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:4px;transition:width .3s}
.hbar-val{font-size:12px;color:#a78bfa;width:40px;text-align:right;flex-shrink:0}

/* Status dot */
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.dot-green{background:#4ade80}
.dot-red{background:#f87171}
.dot-amber{background:#fbbf24}

/* Pagination */
.pagination{display:flex;gap:8px;align-items:center;margin-top:16px;font-size:13px}
.page-info{color:#6b7280}

/* Misc */
code{background:#1e1e38;padding:2px 6px;border-radius:4px;font-size:12px;color:#c4b5fd}
.muted{color:#6b7280;font-size:12px}
.divider{border:none;border-top:1px solid #2a2a4a;margin:16px 0}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
</style>
</head>
<body>
<nav>
  <span class="logo">🔯 Nakshatra Admin</span>
  <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
  <a href="/users" class="nav-link {% if request.url.path.startswith('/users') %}active{% endif %}">Users</a>
  <a href="/analytics" class="nav-link {% if request.url.path == '/analytics' %}active{% endif %}">Analytics</a>
  <a href="/cache" class="nav-link {% if request.url.path == '/cache' %}active{% endif %}">Redis</a>
  <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">Settings</a>
  <span class="spacer"></span>
  <span class="muted" style="padding:14px 0">@Nakshatra_Astrobot</span>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
